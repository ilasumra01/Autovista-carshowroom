<!DOCTYPE html>
<html>
<head>
<title>AutoVista</title>

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ✅ Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Glass Card */
.welcome-box{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease-in-out;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Logo */
.logo{
    width:100px;
    margin-bottom:20px;
    animation: bounce 2s infinite;
}

/* Heading */
h1{
    font-size:42px;
    font-weight:bold;
}

/* Button */
.btn-custom{
    padding:12px 30px;
    font-size:18px;
    border-radius:30px;
    background: linear-gradient(45deg,#1aa39a,#38ef7d);
    border:none;
    color:white;
    transition:0.3s;
}

.btn-custom:hover{
    transform: scale(1.1);
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* Animations */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

</style>

</head>

<body>

<div class="welcome-box">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h1>🚗 Welcome to AutoVista</h1>

    <p class="mb-4">Explore the best cars with amazing features and prices</p>

    <a href="/login_page">
        <button class="btn btn-custom">
            Enter Showroom <i class="fa fa-arrow-right"></i>
        </button>
    </a>

</div>

</body>
</html>
