<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: Arial;
}

.cart-box{
    max-width:700px;
    margin:auto;
    margin-top:50px;
    padding:30px;
    border-radius:20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 1s;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.cart-item{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn-remove{
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
}

.total-box{
    background: linear-gradient(45deg,#00c9ff,#92fe9d);
    padding:15px;
    border-radius:10px;
    color:black;
    text-align:center;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">
<div class="cart-box text-white">

<h2 class="text-center mb-4">🛒 Your Cart</h2>

{% for i in items %}
<div class="cart-item">
<div>
<h5>{{i.model}}</h5>
<p>{{i.price}}</p>
</div>
<a href="/remove/{{i.id}}" class="btn btn-remove btn-sm">Remove</a>
</div>
{% endfor %}

<div class="total-box mt-3">
Total: ₹ {{total}} Lakh
</div>

<div class="text-center mt-3">
<a href="/showroom" class="btn btn-light">Back</a>
</div>

</div>
</div>

</body>
</html>
