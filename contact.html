<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
      background: linear-gradient(135deg,#667eea,#764ba2);
      font-family: Arial;
}

.box{
max-width:600px;
    margin:auto;
    margin-top:60px;
    padding:30px;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.btn-custom{
    background: linear-gradient(45deg,#00c9ff,#92fe9d);
}
</style>
</head>

<body>

<div class="container">
<div class="box text-white">

<h2 class="text-center">📩 Contact</h2>

<form method="POST" action="/submit_contact">
<input type="text" name="name" class="form-control mb-2" placeholder="Name">
<input type="email" name="email" class="form-control mb-2" placeholder="Email">
<input type="text" name="subject" class="form-control mb-2" placeholder="Subject">
<textarea name="message" class="form-control mb-2"></textarea>

<button class="btn btn-custom w-100">Send</button>
<div class="text-center mt-3">
<a href="/showroom" class="btn btn-light">Back</a>
</div>
</form>

</div>
</div>

</body>
</html>
