<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ✅ Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: Arial;
}

/* Card */
.feedback-box{
    max-width:600px;
    margin:auto;
    margin-top:60px;
    padding:30px;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Input focus */
.form-control:focus{
    border-color:#ffc107;
    box-shadow:0 0 8px rgba(255,193,7,0.7);
}

/* Star rating style */
.rating input{
    display:none;
}

.rating label{
    font-size:25px;
    color:#ccc;
    cursor:pointer;
    transition:0.3s;
}

.rating input:checked ~ label,
.rating label:hover,
.rating label:hover ~ label{
    color:#ffc107;
}

/* Button */
.btn-custom{
    background:#ffc107;
    color:black;
    font-weight:bold;
    transition:0.3s;
}

.btn-custom:hover{
    background:#e0a800;
    transform:scale(1.05);
}

/* Footer */
footer{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
    margin-top:50px;
}
</style>

</head>

<body>

<div class="container">

    <div class="feedback-box text-white">

        <h2 class="text-center mb-4">
            <i class="fa-solid fa-star"></i> AutoVista Feedback
        </h2>

        <form method="POST" action="/submit_feedback">

            <input type="hidden" name="car_id" value="{{ car_id if car_id else 0 }}">

            <!-- Name -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input type="text" name="name" class="form-control" placeholder="Your Name" required>
            </div>

            <!-- Email -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Your Email" required>
            </div>

            <!-- Rating -->
            <div class="mb-3 text-center">
                <label class="form-label">Rate Us ⭐</label><br>

                <div class="rating d-inline-block">
                    <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
                    <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
                    <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
                    <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
                    <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
                </div>
            </div>

            <!-- Message -->
            <div class="mb-3">
                <textarea name="message" class="form-control" rows="4" placeholder="Write your feedback..."></textarea>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-custom w-100">
                Submit Feedback 🚀
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="/showroom" class="btn btn-light btn-sm">⬅ Back</a>
        </div>

    </div>

</div>

<!-- FOOTER -->
<footer>
    <h5>🚗 AutoVista Car Showroom</h5>
    <p>📍 Bhavnagar, Gujarat</p>
    <p>📧 ilasumra56@gmail.com</p>
    <p>📞 +91 8469527599</p>
</footer>

</body>
</html>
